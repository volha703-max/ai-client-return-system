<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ольга Жебрик — AI-система для косметологов</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --teal: #c084fc;
    --green: #f472b6;
    --blue: #a855f7;
    --text: #fdf4ff;
    --muted: #a888b5;
    --card: #130d1a;
    --border: rgba(192, 132, 252, 0.15);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow-x: hidden;
  }

  /* Canvas background */
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    opacity: 0.35;
  }

  /* Main layout */
  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 56px 48px;
    max-width: 520px;
    width: 100%;
    text-align: center;
    box-shadow:
      0 0 60px rgba(0, 229, 195, 0.06),
      0 0 120px rgba(0, 153, 255, 0.04),
      0 32px 64px rgba(0,0,0,0.5);
    animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(32px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Avatar ring */
  .avatar-wrap {
    position: relative;
    width: 96px;
    height: 96px;
    margin: 0 auto 32px;
  }

  .avatar-ring {
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--teal), var(--green), var(--blue));
    animation: spinRing 6s linear infinite;
    z-index: 0;
  }

  @keyframes spinRing {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .avatar-inner {
    position: relative;
    z-index: 1;
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: var(--card);
    border: 3px solid var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: 700;
    background: linear-gradient(135deg, #1a0d2e, #2d0a1f);
    color: var(--teal);
    letter-spacing: -1px;
    overflow: hidden;
  }

  /* Name */
  .name {
    font-size: clamp(26px, 6vw, 38px);
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.1;
    margin-bottom: 16px;
    background: linear-gradient(120deg, var(--teal) 0%, var(--green) 45%, var(--blue) 80%, var(--teal) 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradientShift 4s linear infinite;
    filter: drop-shadow(0 0 24px rgba(0, 229, 195, 0.4));
  }

  @keyframes gradientShift {
    from { background-position: 0% center; }
    to   { background-position: 200% center; }
  }

  /* Divider */
  .divider {
    width: 48px;
    height: 2px;
    background: linear-gradient(90deg, var(--teal), var(--blue));
    border-radius: 2px;
    margin: 0 auto 20px;
    opacity: 0.6;
  }

  /* Specialization */
  .spec {
    font-size: 15px;
    line-height: 1.6;
    color: var(--muted);
    margin-bottom: 36px;
    padding: 0 8px;
  }

  .spec strong {
    color: var(--text);
    font-weight: 600;
  }

  /* Tags */
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 36px;
  }

  .tag {
    font-size: 12px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid;
    letter-spacing: 0.3px;
    opacity: 0.85;
  }

  .tag-teal  { border-color: var(--teal);  color: var(--teal);  background: rgba(0,229,195,0.07); }
  .tag-green { border-color: var(--green); color: var(--green); background: rgba(0,255,136,0.07); }
  .tag-blue  { border-color: var(--blue);  color: var(--blue);  background: rgba(0,153,255,0.07); }

  /* CTA Button */
  .btn-wrap {
    margin-bottom: 32px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 15px 36px;
    border-radius: 50px;
    font-size: 16px;
    font-weight: 700;
    text-decoration: none;
    color: #0a0a0a;
    background: linear-gradient(120deg, var(--teal), var(--green) 50%, var(--blue));
    background-size: 200% auto;
    border: none;
    cursor: pointer;
    transition: background-position 0.4s, transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(0, 229, 195, 0.35);
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.2s;
    border-radius: inherit;
  }

  .btn:hover {
    background-position: right center;
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 8px 36px rgba(0, 229, 195, 0.5);
  }

  .btn:hover::after {
    background: rgba(255,255,255,0.08);
  }

  .btn:active {
    transform: translateY(0) scale(0.99);
  }

  .btn svg {
    flex-shrink: 0;
  }

  /* Pulse dot on button */
  .pulse-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(0,0,0,0.4);
    animation: pulse 1.8s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50%       { transform: scale(1.4); opacity: 1; }
  }

  /* Social icons */
  .socials {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 32px;
  }

  .social-link {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    text-decoration: none;
    background: rgba(255,255,255,0.02);
    transition: color 0.2s, border-color 0.2s, background 0.2s, transform 0.2s, box-shadow 0.2s;
  }

  .social-link:hover {
    color: var(--teal);
    border-color: var(--teal);
    background: rgba(0, 229, 195, 0.08);
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0, 229, 195, 0.2);
  }

  .social-link svg {
    width: 20px;
    height: 20px;
  }

  /* Footer note */
  .footer-note {
    font-size: 12px;
    color: rgba(122, 170, 160, 0.5);
    letter-spacing: 0.3px;
  }

  .footer-note span {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--teal);
    margin-right: 6px;
    vertical-align: middle;
    animation: pulse 2s ease-in-out infinite;
  }

  /* Responsive */
  @media (max-width: 480px) {
    .card {
      padding: 40px 28px;
      border-radius: 20px;
    }
  }
</style>
</head>

<script>
  // Animated background canvas
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const symbols = ['✦', '◈', 'AI', '⬡', '◇', '⬢', '✧', '⊕', '≋', '∿'];
  const particles = [];

  for (let i = 0; i < 28; i++) {
    particles.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      sym: symbols[Math.floor(Math.random() * symbols.length)],
      size: 9 + Math.random() * 8,
      speedX: (Math.random() - 0.5) * 0.3,
      speedY: -0.2 - Math.random() * 0.3,
      opacity: 0.05 + Math.random() * 0.15,
      color: ['#c084fc','#f472b6','#a855f7'][Math.floor(Math.random() * 3)]
    });
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.opacity;
      ctx.fillStyle = p.color;
      ctx.font = `${p.size}px monospace`;
      ctx.fillText(p.sym, p.x, p.y);
      ctx.restore();

      p.x += p.speedX;
      p.y += p.speedY;

      if (p.y < -20) {
        p.y = canvas.height + 20;
        p.x = Math.random() * canvas.width;
      }
      if (p.x < -20) p.x = canvas.width + 20;
      if (p.x > canvas.width + 20) p.x = -20;
    });

    requestAnimationFrame(draw);
  }

  draw();
</script>
