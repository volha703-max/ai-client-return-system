<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ольга Жебрик — AI-система для косметологов</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:     #fdf8ff;
    --purple: #9333ea;
    --pink:   #ec4899;
    --violet: #c084fc;
    --text:   #1a0533;
    --muted:  #7c5a9a;
    --card:   #ffffff;
    --border: rgba(147, 51, 234, 0.13);
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI Variable Display',
                 'Segoe UI', system-ui, sans-serif;
    overflow-x: hidden;
  }

  /* ── CSS blobs ── */
  .blob-1, .blob-2 {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }

  .blob-1 {
    width: 560px; height: 560px;
    background: radial-gradient(circle, rgba(192,132,252,0.2) 0%, transparent 70%);
    top: -160px; right: -120px;
    animation: blobFloat 9s ease-in-out infinite;
  }

  .blob-2 {
    width: 480px; height: 480px;
    background: radial-gradient(circle, rgba(236,72,153,0.16) 0%, transparent 70%);
    bottom: -100px; left: -80px;
    animation: blobFloat 11s ease-in-out infinite reverse;
  }

  @keyframes blobFloat {
    0%, 100% { transform: scale(1) translate(0, 0); }
    50%       { transform: scale(1.1) translate(16px, -16px); }
  }

  /* ── Layout ── */
  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  /* ── Card ── */
  .card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 32px;
    padding: 56px 48px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    box-shadow:
      0 4px 32px rgba(147,51,234,0.07),
      0 24px 64px rgba(147,51,234,0.05);
    animation: cardIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    position: relative;
    overflow: hidden;
  }

  /* Цветная полоска сверху карточки */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--purple), var(--pink), var(--violet));
    border-radius: 32px 32px 0 0;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(28px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── Avatar ── */
  .avatar-wrap {
    position: relative;
    width: 100px;
    height: 100px;
    margin: 0 auto 28px;
  }

  .avatar-ring {
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: conic-gradient(var(--purple), var(--pink), var(--violet), var(--purple));
    animation: spinRing 5s linear infinite;
    z-index: 0;
  }

  @keyframes spinRing {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .avatar-inner {
    position: relative;
    z-index: 1;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 3px solid var(--card);
    overflow: hidden;
    background: linear-gradient(135deg, #f3e8ff, #fce7f3);
  }

  .avatar-inner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  /* ── Badge ── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--purple);
    border: 1.5px solid rgba(147,51,234,0.25);
    border-radius: 20px;
    padding: 5px 14px;
    margin-bottom: 20px;
    background: rgba(147,51,234,0.06);
    animation: fadeUp 0.5s ease both 0.2s;
  }

  .badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--purple);
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(1.5); }
  }

  /* ── Name ── */
  .name {
    font-size: clamp(28px, 7vw, 40px);
    font-weight: 900;
    letter-spacing: -1.5px;
    line-height: 1.05;
    margin-bottom: 8px;
    color: var(--text);
    animation: fadeUp 0.5s ease both 0.1s;
  }

  /* ── Divider ── */
  .divider {
    width: 56px;
    height: 4px;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--purple), var(--pink));
    margin: 16px auto 20px;
    animation: fadeUp 0.5s ease both 0.15s;
  }

  /* ── Specialization ── */
  .spec {
    font-size: 15px;
    line-height: 1.65;
    color: var(--muted);
    margin-bottom: 28px;
    padding: 0 4px;
    animation: fadeUp 0.5s ease both 0.2s;
  }

  .spec strong {
    color: var(--text);
    font-weight: 700;
  }

  /* ── Tags ── */
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 32px;
    animation: fadeUp 0.5s ease both 0.25s;
  }

  .tag {
    font-size: 12px;
    font-weight: 700;
    padding: 5px 13px;
    border-radius: 20px;
    letter-spacing: 0.2px;
  }

  .tag-purple { color: var(--purple); background: rgba(147,51,234,0.08); border: 1.5px solid rgba(147,51,234,0.2); }
  .tag-pink   { color: var(--pink);   background: rgba(236,72,153,0.08);  border: 1.5px solid rgba(236,72,153,0.2); }
  .tag-violet { color: #7c3aed;       background: rgba(124,58,237,0.08);  border: 1.5px solid rgba(124,58,237,0.2); }

  /* ── CTA Button ── */
  .btn-wrap {
    margin-bottom: 28px;
    animation: fadeUp 0.5s ease both 0.3s;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 15px 38px;
    border-radius: 50px;
    font-size: 16px;
    font-weight: 800;
    text-decoration: none;
    color: #fff;
    background: linear-gradient(120deg, var(--purple), var(--pink) 60%, var(--violet));
    background-size: 200% auto;
    border: none;
    cursor: pointer;
    box-shadow: 0 6px 28px rgba(147,51,234,0.35);
    transition: background-position 0.4s, transform 0.2s, box-shadow 0.2s;
    animation: btnPulse 2.4s ease-in-out infinite;
  }

  .btn:hover {
    background-position: right center;
    transform: translateY(-2px) scale(1.04);
    box-shadow: 0 12px 36px rgba(147,51,234,0.45);
  }

  .btn:active { transform: scale(0.98); }

  .btn svg { flex-shrink: 0; }

  .pulse-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    animation: pulse 1.8s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes btnPulse {
    0%   { box-shadow: 0 6px 28px rgba(147,51,234,0.35), 0 0 0 0 rgba(147,51,234,0.25); }
    60%  { box-shadow: 0 6px 28px rgba(147,51,234,0.35), 0 0 0 16px rgba(147,51,234,0); }
    100% { box-shadow: 0 6px 28px rgba(147,51,234,0.35), 0 0 0 0 rgba(147,51,234,0); }
  }

  /* ── Socials ── */
  .socials {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 28px;
    animation: fadeUp 0.5s ease both 0.35s;
  }

  .social-link {
    width: 44px; height: 44px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    text-decoration: none;
    background: rgba(147,51,234,0.03);
    transition: color 0.2s, border-color 0.2s, background 0.2s,
                transform 0.2s, box-shadow 0.2s;
  }

  .social-link:hover {
    color: var(--purple);
    border-color: rgba(147,51,234,0.4);
    background: rgba(147,51,234,0.07);
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(147,51,234,0.15);
  }

  .social-link svg { width: 20px; height: 20px; }

  /* ── Footer note ── */
  .footer-note {
    font-size: 12px;
    color: rgba(124,90,154,0.5);
    letter-spacing: 0.3px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    animation: fadeUp 0.5s ease both 0.4s;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--purple);
    animation: pulse 2.2s ease-in-out infinite;
    flex-shrink: 0;
  }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .card { padding: 40px 24px; border-radius: 24px; }
    .blob-1 { width: 300px; height: 300px; }
    .blob-2 { width: 260px; height: 260px; }
  }
</style>
</head>
